# ──────────────────────────────────────────────────────────────────────────────
# Mandi Agent — Production CI/CD Pipeline
# ──────────────────────────────────────────────────────────────────────────────
# Jobs run in parallel where possible:
#   backend-lint ─► backend-test ─► docker-build
#   mobile-typecheck ─► mobile-build ─► deploy-web
# ──────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── BACKEND LINT ───────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: mandi_agent/backend/requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff check)
        run: ruff check mandi_agent/

      - name: Format check (ruff format)
        run: ruff format --check mandi_agent/

  # ─── BACKEND TEST ───────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    needs: backend-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: mandi_agent/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r mandi_agent/backend/requirements.txt

      - name: Run tests
        run: |
          cd mandi_agent
          PYTHONPATH=$PYTHONPATH:$(pwd) pytest tests/ -v --tb=short
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  # ─── MOBILE TYPECHECK ──────────────────────────────────────────────────────
  mobile-typecheck:
    name: Mobile TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mobile

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: mobile

  # ─── MOBILE BUILD ──────────────────────────────────────────────────────────
  mobile-build:
    name: Mobile Web Build
    needs: mobile-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mobile

      - name: Expo export (web)
        run: npx expo export --platform web
        working-directory: mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Fix asset paths for subpath deployment
        run: |
          sed -i 's|src="/_expo|src="./_expo|g' mobile/dist/index.html
          sed -i 's|href="/_expo|href="./_expo|g' mobile/dist/index.html

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-web-build
          path: mobile/dist/
          if-no-files-found: error

  # ─── DOCKER BUILD & PUSH ───────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    needs: backend-test
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=edge,branch=main
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./mandi_agent
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── DEPLOY WEB (GitHub Pages) ─────────────────────────────────────────────
  # Requires: Repo Settings → Pages → Source: "GitHub Actions"
  deploy-web:
    name: Deploy Web to Pages
    needs: mobile-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: mobile-web-build
          path: mobile/dist/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mobile/dist/

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
