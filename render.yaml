# ──────────────────────────────────────────────────────────────────────────────
# Mandi Agent — Render Blueprint
# ──────────────────────────────────────────────────────────────────────────────
# Usage:
#   1. Push to main or v* tag → CI builds and pushes multi-stage Docker image
#      with the web app baked in (no separate frontend deployment needed)
#   2. In Render Dashboard, create a new "Web Service"
#   3. Choose "Existing Image" → ghcr.io/rohanesor/mandi-agent:latest
#   4. Set port to 8000
#   5. Add environment variables (see below)
#   6. Visit https://your-service.onrender.com — the web app and API
#      are served from the same origin (no CORS issues)
# ──────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: mandi-agent
    env: docker
    image: ghcr.io/rohanesor/mandi-agent:latest
    port: 8000
    healthCheckPath: /api/health
    envVars:
      - key: FRONTEND_URL
        value: https://rohanesor.github.io
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: N8N_BASE_URL
        value: ""
      - key: N8N_WEBHOOK_URL
        value: ""
